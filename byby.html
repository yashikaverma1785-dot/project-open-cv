<!DOCTYPE html>
<html>
<head>
  <title>AI Body Scanner</title>

  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: black;
      font-family: 'Orbitron', sans-serif;
    }

    video, canvas {
      position: absolute;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    h1 {
      position: absolute;
      top: 20px;
      width: 100%;
      text-align: center;
      color: #00ffff;
      text-shadow: 0 0 15px #00ffff, 0 0 30px #ff00ff;
    }

    /* 🔥 SCAN LINE */
    .scan {
      position: absolute;
      width: 100%;
      height: 3px;
      background: linear-gradient(90deg, transparent, #00ffff, transparent);
      animation: scan 2.5s linear infinite;
    }

    @keyframes scan {
      0% { top: 0%; }
      100% { top: 100%; }
    }

    /* 🔥 GRID EFFECT */
    .grid {
      position: absolute;
      width: 100%;
      height: 100%;
      background-image: 
        linear-gradient(rgba(0,255,255,0.1) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,255,0.1) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    /* 🔥 STATUS TEXT */
    #status {
      position: absolute;
      bottom: 60px;
      width: 100%;
      text-align: center;
      color: #ff77ff;
      font-size: 28px;
      animation: glow 1.5s ease-in-out infinite alternate;
    }

    @keyframes glow {
      from { text-shadow: 0 0 5px #ff77ff; }
      to { text-shadow: 0 0 20px #ff00ff, 0 0 30px #00ffff; }
    }

    /* 🔥 COUNTDOWN */
    #count {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 120px;
      color: #00ffff;
      text-shadow: 0 0 30px #00ffff;
    }

    /* 🔥 PREVIEW */
    #preview {
      position: absolute;
      bottom: 10px;
      right: 10px;
      width: 200px;
      border: 2px solid cyan;
      display: none;
    }
  </style>
</head>

<body>

<h1>⚡ AI BODY SCANNER ⚡</h1>

<div class="scan"></div>
<div class="grid"></div>

<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>

<div id="status">Searching body...</div>
<div id="count"></div>

<img id="preview"/>

<!-- sounds -->
<audio id="beep" src="https://www.soundjay.com/button/beep-07.wav"></audio>
<audio id="click" src="https://www.soundjay.com/mechanical/camera-shutter-click-01.wav"></audio>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

const beep = document.getElementById('beep');
const click = document.getElementById('click');

let countdown = 3;
let counting = false;
let captured = false;

const pose = new Pose({
  locateFile: (file) => {
    return `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`;
  }
});

pose.setOptions({
  modelComplexity: 1,
  smoothLandmarks: true,
  minDetectionConfidence: 0.5,
  minTrackingConfidence: 0.5
});

pose.onResults(results => {

  if (captured) return;

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (results.poseLandmarks) {

    document.getElementById("status").innerText = "Stay Still...";

    // draw points
    results.poseLandmarks.forEach(point => {
      const x = point.x * canvas.width;
      const y = point.y * canvas.height;

      ctx.beginPath();
      ctx.arc(x, y, 6, 0, 2 * Math.PI);
      ctx.fillStyle = "#ff77ff";
      ctx.shadowColor = "#00ffff";
      ctx.shadowBlur = 15;
      ctx.fill();
    });

    if (!counting) {
      counting = true;

      let interval = setInterval(() => {
        document.getElementById("count").innerText = countdown;
        beep.play();

        countdown--;

        if (countdown < 0) {
          clearInterval(interval);

          captured = true;
          document.getElementById("count").innerText = "";
          document.getElementById("status").innerText = "Captured 📸";

          // 🔥 REAL CAPTURE
          const tempCanvas = document.createElement("canvas");
          tempCanvas.width = video.videoWidth;
          tempCanvas.height = video.videoHeight;

          const tempCtx = tempCanvas.getContext("2d");
          tempCtx.drawImage(video, 0, 0);

          const image = tempCanvas.toDataURL("image/png");

          // preview
          const preview = document.getElementById("preview");
          preview.src = image;
          preview.style.display = "block";

          // sound
          click.play();

          // smooth flash
          document.body.style.transition = "0.2s";
          document.body.style.background = "white";

          setTimeout(() => {
            document.body.style.background = "black";
          }, 150);

          video.pause();

          setTimeout(() => {
            document.getElementById("status").innerText = "Processing...";
          }, 600);
        }

      }, 1000);
    }

  } else {
    document.getElementById("status").innerText = "Searching body...";
    document.getElementById("count").innerText = "";
    counting = false;
    countdown = 3;
  }
});

const camera = new Camera(video, {
  onFrame: async () => {
    await pose.send({image: video});
  },
  width: 1280,
  height: 720
});

camera.start();
</script>

</body>
</html>
